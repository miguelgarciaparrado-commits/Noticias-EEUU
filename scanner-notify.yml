name: Scanner RSI Notifier

on:
  schedule:
    # cada 5 min en horario USA (14-22 UTC L-V)
    - cron: '*/5 14-22 * * 1-5'
    # cada 10 min resto del tiempo (BTC 24/7)
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: scanner-notifier
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install supabase yfinance pandas requests

      - name: Run notifier
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          WA_APIKEY_DEFAULT: ${{ secrets.WA_APIKEY }}
        run: python scanner_notifier.py
