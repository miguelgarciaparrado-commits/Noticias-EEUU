name: Daily Economic Calendar WhatsApp

on:
  schedule:
    on:
  schedule:
    # Intentamos varias veces entre UTC 05:30 y 07:00 para cubrir:
    # - Horario de verano (CEST): Madrid 07:30 - 09:00
    # - Horario de invierno (CET): Madrid 06:30 - 08:00
    # El script solo envía cuando la hora local sea exactamente 08:00.
    - cron: '30 5 * * 1-5'
    - cron: '45 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily notification
        env:
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python fetch_and_notify.py
