name: Daily Economic Calendar WhatsApp

on:
  schedule:
    - cron: '30 5 * * 1-5'
    - cron: '45 5 * * 1-5'
    - cron: '0 6 * * 1-5'
    - cron: '15 6 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '45 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download last_sent marker
        uses: actions/download-artifact@v4
        with:
          name: last-sent-marker
          path: .
        continue-on-error: true

      - name: Send daily notification
        env:
          WA_PHONE: ${{ secrets.WA_PHONE }}
          WA_APIKEY: ${{ secrets.WA_APIKEY }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python fetch_and_notify.py

      - name: Upload last_sent marker
        if: hashFiles('last_sent.txt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: last-sent-marker
          path: last_sent.txt
          retention-days: 7
          overwrite: true