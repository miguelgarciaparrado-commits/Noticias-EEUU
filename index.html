<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pattern Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b; --surface: #111114; --surface-2: #17171c; --surface-3: #1e1e25;
    --border: #24242b; --border-strong: #33333c;
    --text: #e7e7ea; --text-muted: #8a8a94; --text-dim: #55555d;
    --bull: #10b981; --bull-faint: rgba(16,185,129,.12); --bull-line: rgba(16,185,129,.45);
    --bear: #ef4444; --bear-faint: rgba(239,68,68,.12); --bear-line: rgba(239,68,68,.45);
    --accent: #f59e0b;
    --rsi: #a855f7; --rsi-dim: rgba(168,85,247,.15);
    --wa: #25d366;
    --font-sans: "IBM Plex Sans", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.45; -webkit-font-smoothing: antialiased; overflow: hidden; }
  .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }

  .auth-screen { display: none !important; }
  .auth-card { width: 100%; max-width: 400px; }
  .auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; justify-content: center; }
  .auth-brand-mark { width: 40px; height: 40px; background: var(--accent); display: grid; place-items: center; font-weight: 700; color: #000; font-size: 20px; border-radius: 6px; }
  .auth-title { font-size: 20px; font-weight: 600; }
  .auth-subtitle { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .auth-tabs { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--surface-2); margin-bottom: 20px; }
  .auth-tab { flex: 1; padding: 10px; background: transparent; color: var(--text-muted); border: none; cursor: pointer; font-size: 13px; border-right: 1px solid var(--border); }
  .auth-tab:last-child { border-right: none; }
  .auth-tab.active { background: var(--accent); color: #000; font-weight: 600; }
  .auth-error, .auth-info { padding: 10px 12px; border-radius: 5px; font-size: 12px; margin-bottom: 14px; display: none; }
  .auth-error { background: var(--bear-faint); border: 1px solid var(--bear-line); color: var(--bear); }
  .auth-info { background: rgba(16,185,129,.08); border: 1px solid var(--bull-line); color: var(--bull); }
  .auth-error.show, .auth-info.show { display: block; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 14px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 28px; height: 28px; background: var(--accent); display: grid; place-items: center; font-weight: 700; color: #000; font-size: 15px; border-radius: 4px; }
  .brand-name { font-weight: 600; font-size: 14px; }
  .brand-name span { color: var(--text-muted); font-weight: 400; margin-left: 6px; font-size: 12px; }

  .ticker { display: flex; align-items: baseline; gap: 12px; font-family: var(--font-mono); }
  .ticker-symbol { font-size: 12px; color: var(--text-muted); }
  .ticker-price { font-size: 20px; font-weight: 500; transition: color .2s; }
  .ticker-price.up { color: var(--bull); }
  .ticker-price.down { color: var(--bear); }
  .ticker-change { font-size: 12px; padding: 3px 7px; border-radius: 3px; font-weight: 500; }
  .ticker-change.up { background: var(--bull-faint); color: var(--bull); }
  .ticker-change.down { background: var(--bear-faint); color: var(--bear); }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .asset-select { background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 7px 10px; font-family: var(--font-sans); font-size: 12px; font-weight: 500; cursor: pointer; min-width: 140px; }
  .asset-select:focus { outline: none; border-color: var(--accent); }
  .tf-group, .view-group { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; background: var(--surface-2); }
  .tf-btn, .view-btn { background: transparent; color: var(--text-muted); border: none; padding: 6px 12px; font-size: 11px; cursor: pointer; border-right: 1px solid var(--border); }
  .tf-btn { font-family: var(--font-mono); }
  .view-btn { font-family: var(--font-sans); font-size: 12px; font-weight: 500; }
  .tf-btn:last-child, .view-btn:last-child { border-right: none; }
  .tf-btn:hover, .view-btn:hover { color: var(--text); background: var(--border); }
  .tf-btn.active, .view-btn.active { background: var(--accent); color: #000; font-weight: 600; }

  .user-menu { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; cursor: pointer; font-size: 12px; }
  .user-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: #000; display: grid; place-items: center; font-weight: 700; font-size: 10px; font-family: var(--font-mono); }
  .user-email { color: var(--text); font-family: var(--font-mono); max-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .icon-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); width: 32px; height: 32px; border-radius: 5px; cursor: pointer; font-size: 16px; display: grid; place-items: center; }
  .icon-btn:hover { color: var(--text); border-color: var(--border-strong); }
  .icon-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
  .icon-btn.spinning { animation: spin 1s linear infinite; }

  .main { display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } .sidebar { max-height: 45vh; } }

  .chart-area { position: relative; background: var(--bg); border-right: 1px solid var(--border); min-height: 0; }
  #chart { width: 100%; height: 100%; }
  #fvg-overlay { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 2; }
  .loading { position: absolute; inset: 0; display: grid; place-items: center; background: var(--bg); color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; z-index: 10; }
  .loading.hidden { display: none; }
  .loading-dot { display: inline-block; animation: pulse 1.4s infinite; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }

  .sidebar { background: var(--surface); overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .panel { padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .panel-title { font-size: 10px; font-weight: 600; letter-spacing: .15em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
  .panel-count { font-family: var(--font-mono); background: var(--surface-2); padding: 2px 7px; border-radius: 3px; font-size: 11px; letter-spacing: 0; }
  .panel-action { font-family: var(--font-sans); font-size: 11px; color: var(--accent); cursor: pointer; text-transform: none; letter-spacing: 0; font-weight: 500; }
  .panel-action:hover { text-decoration: underline; }

  .rsi-display { display: flex; align-items: center; justify-content: space-between; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; padding: 12px 14px; }
  .rsi-current-value { font-family: var(--font-mono); font-size: 28px; font-weight: 500; line-height: 1; }
  .rsi-current-value.oversold { color: var(--bull); }
  .rsi-current-value.overbought { color: var(--bear); }
  .rsi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; }
  .rsi-zone { font-size: 10px; font-weight: 600; letter-spacing: .08em; padding: 3px 7px; border-radius: 3px; text-transform: uppercase; }
  .rsi-zone.oversold { background: var(--bull-faint); color: var(--bull); }
  .rsi-zone.overbought { background: var(--bear-faint); color: var(--bear); }
  .rsi-zone.neutral { background: var(--surface-3); color: var(--text-muted); }
  .rsi-period-row { display: flex; align-items: center; justify-content: space-between; font-size: 11.5px; color: var(--text-muted); margin-top: 10px; }
  .period-input { width: 60px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; padding: 4px 7px; color: var(--text); font-family: var(--font-mono); font-size: 12px; text-align: center; }

  .alert-list { display: flex; flex-direction: column; gap: 6px; }
  .alert-item { padding: 9px 11px; background: var(--surface-2); border: 1px solid var(--border); border-left: 3px solid var(--rsi); border-radius: 4px; cursor: pointer; }
  .alert-item.inactive { opacity: .5; }
  .alert-item-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; gap: 6px; }
  .alert-level { font-family: var(--font-mono); font-size: 14px; font-weight: 600; color: var(--rsi); display: inline-flex; align-items: center; gap: 5px; }
  .alert-label { font-size: 11px; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .alert-meta { display: flex; gap: 8px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .alert-delete { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 0 3px; }
  .alert-delete:hover { color: var(--bear); }

  .toggle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .toggle { display: flex; align-items: center; gap: 7px; padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 11.5px; color: var(--text-muted); user-select: none; }
  .toggle.on { border-color: var(--accent); color: var(--text); background: rgba(245,158,11,.05); }
  .toggle-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
  .toggle.on .toggle-dot { background: var(--accent); }

  .pattern-list { display: flex; flex-direction: column; gap: 6px; max-height: 400px; overflow-y: auto; }
  .pattern-item { padding: 9px 11px; background: var(--surface-2); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 4px; cursor: pointer; }
  .pattern-item.bull { border-left-color: var(--bull); }
  .pattern-item.bear { border-left-color: var(--bear); }
  .pattern-item-head { display: flex; justify-content: space-between; margin-bottom: 3px; }
  .pattern-item-name { font-size: 12.5px; font-weight: 500; }
  .pattern-item-time { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-dim); }
  .pattern-item-meta { display: flex; gap: 8px; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); }
  .pattern-tag { text-transform: uppercase; font-size: 9px; padding: 2px 5px; border-radius: 2px; letter-spacing: .08em; font-weight: 600; }
  .pattern-tag.bull { background: var(--bull-faint); color: var(--bull); }
  .pattern-tag.bear { background: var(--bear-faint); color: var(--bear); }
  .outcome-tag { font-size: 9px; padding: 2px 5px; border-radius: 2px; font-weight: 600; }
  .outcome-tag.pending { background: var(--surface-3); color: var(--text-muted); }
  .outcome-tag.success { background: var(--bull-faint); color: var(--bull); }
  .outcome-tag.failure { background: var(--bear-faint); color: var(--bear); }
  .outcome-tag.invalidated { background: rgba(148,163,184,.15); color: #94a3b8; }

  .empty { text-align: center; padding: 18px 10px; color: var(--text-dim); font-size: 12px; font-style: italic; }
  .legend-row { display: flex; align-items: center; gap: 9px; font-size: 11.5px; color: var(--text-muted); margin-bottom: 5px; }
  .legend-box { width: 18px; height: 11px; border-radius: 2px; }
  .legend-box.bull { background: var(--bull-faint); border: 1px solid var(--bull-line); }
  .legend-box.bear { background: var(--bear-faint); border: 1px solid var(--bear-line); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: var(--surface-2); padding: 9px 11px; border-radius: 4px; border: 1px solid var(--border); }
  .stat-label { font-size: 9.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px; }
  .stat-value { font-family: var(--font-mono); font-size: 17px; font-weight: 500; }
  .stat-value.bull { color: var(--bull); }
  .stat-value.bear { color: var(--bear); }
  .stat-value.accent { color: var(--accent); }

  .status-bar { padding: 7px 16px; font-size: 10.5px; font-family: var(--font-mono); color: var(--text-dim); border-top: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .status-section { display: inline-flex; align-items: center; gap: 6px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bull); animation: live 1.5s infinite; }
  @keyframes live { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .wa-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--wa); }
  .wa-dot.off { background: var(--text-dim); }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 8px; width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 14px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-body { padding: 18px 20px; }
  .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 10.5px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .form-input, .form-textarea { width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; padding: 9px 11px; color: var(--text); font-family: var(--font-mono); font-size: 12.5px; }
  .form-input:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
  .form-textarea { font-family: var(--font-sans); font-size: 13px; min-height: 70px; resize: vertical; }
  .form-hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; font-family: var(--font-sans); }
  .form-hint a { color: var(--accent); }

  .btn { padding: 8px 16px; border-radius: 5px; font-size: 12.5px; cursor: pointer; font-weight: 500; border: 1px solid transparent; font-family: var(--font-sans); }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
  .btn-danger { background: var(--bear); color: white; }
  .btn-full { width: 100%; }

  .outcome-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .outcome-btn { padding: 8px 6px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; color: var(--text-muted); font-size: 11.5px; cursor: pointer; text-align: center; }
  .outcome-btn.selected.pending { border-color: var(--text-muted); color: var(--text); background: rgba(148,163,184,.08); }
  .outcome-btn.selected.success { border-color: var(--bull); color: var(--bull); background: var(--bull-faint); }
  .outcome-btn.selected.failure { border-color: var(--bear); color: var(--bear); background: var(--bear-faint); }
  .outcome-btn.selected.invalidated { border-color: #94a3b8; color: #94a3b8; background: rgba(148,163,184,.12); }

  .condition-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .condition-btn { padding: 12px 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 5px; color: var(--text-muted); cursor: pointer; text-align: center; }
  .condition-btn.selected { background: var(--rsi-dim); border-color: var(--rsi); color: var(--rsi); }
  .condition-btn .cond-icon { font-size: 20px; line-height: 1; }
  .condition-btn .cond-label { font-size: 11px; font-weight: 600; margin-top: 3px; }

  .slider-wrap { display: flex; align-items: center; gap: 12px; background: var(--surface-2); padding: 10px 12px; border: 1px solid var(--border); border-radius: 5px; }
  .slider-wrap input[type="range"] { flex: 1; accent-color: var(--rsi); }
  .slider-value { font-family: var(--font-mono); font-size: 18px; font-weight: 600; color: var(--rsi); min-width: 44px; text-align: center; }

  .pattern-detail-head { padding: 12px 14px; background: var(--surface-2); border-radius: 5px; margin-bottom: 14px; border-left: 3px solid var(--border); }
  .pattern-detail-head.bull { border-left-color: var(--bull); }
  .pattern-detail-head.bear { border-left-color: var(--bear); }
  .pattern-detail-head .row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; color: var(--text-muted); }
  .pattern-detail-head .row strong { color: var(--text); font-family: var(--font-mono); }

  .success-rate-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .rate-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 7px 9px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
  .rate-bar-wrap { width: 60px; height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; }
  .rate-bar { height: 100%; background: var(--bull); }
  .rate-bar.low { background: var(--bear); }
  .rate-bar.mid { background: var(--accent); }
  .rate-pct { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); min-width: 48px; text-align: right; }

  .warning-box { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.3); border-radius: 5px; padding: 12px; font-size: 12px; margin-bottom: 12px; }
  .warning-box strong { color: var(--accent); }

  .toast-container { position: fixed; top: 16px; right: 16px; z-index: 200; display: flex; flex-direction: column; gap: 8px; max-width: 340px; pointer-events: none; }
  .toast { background: var(--surface); border: 1px solid var(--border-strong); border-left: 3px solid var(--rsi); padding: 12px 14px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,.5); pointer-events: auto; animation: slide-in .25s ease-out; transition: opacity .3s, transform .3s; }
  .toast.bull { border-left-color: var(--bull); }
  .toast.bear { border-left-color: var(--bear); }
  .toast.fading { opacity: 0; transform: translateX(20px); }
  @keyframes slide-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .toast-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 8px; }
  .toast-close { background: none; bord
